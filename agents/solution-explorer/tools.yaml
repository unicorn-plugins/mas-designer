tools:
  - name: file_read
    description: "선행 산출물·가이드 읽기"
    input: { 파일경로 }
    output: { 파일내용 }

  - name: file_write
    description: "탐색 결과 저장"
    input: { 파일경로, 내용 }
    output: { 저장결과 }

  - name: web_search
    description: "타 도메인 성공 사례·AI 활용 사례 조사"
    input: { 검색어 }
    output: { 검색결과 }
