# mas-designer 런타임 매핑
# 추상 선언(tier, 추상 도구, 금지 액션) → 구체 구현 변환 테이블.
# 모델명은 2026-04-21 기준 최신 버전. setup 스킬이 사용자 확인 후 필요 시 조정.

# ─────────────────────────────────────────────
# 티어 → LLM 모델 매핑
# ─────────────────────────────────────────────
tier_mapping:
  default:
    HEAVY:
      model: "claude-opus-4-7"
    HIGH:
      model: "claude-opus-4-7"
    MEDIUM:
      model: "claude-sonnet-4-6"
    LOW:
      model: "claude-haiku-4-5"

  # mas-architect 세부역할별 예외
  # graph-designer는 LangGraph 설계의 핵심이므로 HIGH 유지, 나머지는 MEDIUM으로 비용 절감
  mas-architect:
    HIGH:
      model: "claude-opus-4-7"
    sub_roles:
      graph-designer:
        HIGH:
          model: "claude-opus-4-7"
      tool-mcp-binder:
        MEDIUM:
          model: "claude-sonnet-4-6"
      rag-planner:
        MEDIUM:
          model: "claude-sonnet-4-6"
      multimodal-mapper:
        MEDIUM:
          model: "claude-sonnet-4-6"

# ─────────────────────────────────────────────
# 추상 도구 → 실제 도구 매핑
# (builtin: Read, Write, Edit, Bash, WebSearch, AskUserQuestion 등은 런타임 내장이므로 제외)
# ─────────────────────────────────────────────
tool_mapping:
  image_generate:
    - type: custom
      source: "tools/generate_image.py"
      tools: ["generate_image"]

# ─────────────────────────────────────────────
# 금지 액션 카테고리 → 실제 도구 매핑
# ─────────────────────────────────────────────
action_mapping:
  file_read: ["Read", "Glob"]
  file_write: ["Write", "Edit"]
  file_delete: ["Bash"]
  code_execute: ["Bash"]
  network_access: ["WebFetch", "WebSearch"]
  user_interact: ["AskUserQuestion"]
  agent_delegate: ["Task"]
