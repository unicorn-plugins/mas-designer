<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" font-family="Pretendard, sans-serif">
  <style>
    .axis { stroke: #374151; stroke-width: 2; }
    .grid { stroke: #E5E7EB; stroke-width: 1; stroke-dasharray: 2,3; }
    .label-axis { font-size: 14px; font-weight: 600; fill: #111827; }
    .label-quadrant { font-size: 13px; font-weight: 700; fill: #6B7280; }
    .title { font-size: 18px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 12px; fill: #6B7280; }
    .dot { stroke: #111827; stroke-width: 1.5; }
    .dot-label { font-size: 12px; font-weight: 600; fill: #111827; }
    .dot-star { fill: #DC2626; stroke: #991B1B; stroke-width: 2; }
  </style>

  <!-- 제목 -->
  <text x="360" y="30" text-anchor="middle" class="title">솔루션 우선순위 매트릭스 (B/F)</text>
  <text x="360" y="50" text-anchor="middle" class="subtitle">dealer-docs-automator · 6개 후보</text>

  <!-- 배경 사분면 -->
  <rect x="80" y="80" width="560" height="420" fill="#FAFAFA" stroke="#D1D5DB" />

  <!-- 사분면 구분선 -->
  <line x1="360" y1="80" x2="360" y2="500" class="grid" />
  <line x1="80" y1="290" x2="640" y2="290" class="grid" />

  <!-- 사분면 레이블 -->
  <text x="220" y="115" text-anchor="middle" class="label-quadrant">Utilities (B저·F고)</text>
  <text x="500" y="115" text-anchor="middle" class="label-quadrant">No Brainers (B고·F고)</text>
  <text x="220" y="490" text-anchor="middle" class="label-quadrant">Unwise (B저·F저)</text>
  <text x="500" y="490" text-anchor="middle" class="label-quadrant">Bit Bets (B고·F저)</text>

  <!-- 축 -->
  <line x1="80" y1="500" x2="640" y2="500" class="axis" />
  <line x1="80" y1="80" x2="80" y2="500" class="axis" />

  <!-- 축 레이블 -->
  <text x="360" y="540" text-anchor="middle" class="label-axis">→ Benefit (비즈니스 임팩트)</text>
  <text x="40" y="290" text-anchor="middle" class="label-axis" transform="rotate(-90, 40, 290)">→ Feasibility (실현가능성)</text>

  <!-- 축 눈금 -->
  <text x="80" y="515" text-anchor="middle" class="subtitle">0</text>
  <text x="640" y="515" text-anchor="middle" class="subtitle">5</text>
  <text x="70" y="85" text-anchor="end" class="subtitle">5</text>
  <text x="70" y="505" text-anchor="end" class="subtitle">0</text>

  <!-- 후보 점 (좌표: x = 80 + B*112, y = 500 - F*84) -->
  <!-- RTA: B=5, F=4 → (640, 164) -->
  <circle cx="640" cy="164" r="14" class="dot dot-star" />
  <text x="640" y="148" text-anchor="middle" class="dot-label" fill="#DC2626">★ 1. RTA</text>
  <text x="640" y="190" text-anchor="middle" class="subtitle">B5 · F4</text>

  <!-- IDV+: B=4, F=4 → (528, 164) -->
  <circle cx="528" cy="164" r="10" class="dot" fill="#3B82F6" />
  <text x="528" y="148" text-anchor="middle" class="dot-label">2. IDV+</text>
  <text x="528" y="190" text-anchor="middle" class="subtitle">B4 · F4</text>

  <!-- RegGuard: B=4, F=5 → (528, 80) -->
  <circle cx="528" cy="100" r="10" class="dot" fill="#10B981" />
  <text x="528" y="84" text-anchor="middle" class="dot-label">3. RegGuard</text>
  <text x="528" y="122" text-anchor="middle" class="subtitle">B4 · F5</text>

  <!-- AutoDoc: B=3, F=5 → (416, 80) -->
  <circle cx="416" cy="100" r="9" class="dot" fill="#F59E0B" />
  <text x="416" y="84" text-anchor="middle" class="dot-label">4. AutoDoc</text>
  <text x="416" y="122" text-anchor="middle" class="subtitle">B3 · F5</text>

  <!-- DealerCopilot: B=3, F=4 → (416, 164) -->
  <circle cx="416" cy="164" r="9" class="dot" fill="#8B5CF6" />
  <text x="416" y="148" text-anchor="middle" class="dot-label">5. DealerCopilot</text>
  <text x="416" y="190" text-anchor="middle" class="subtitle">B3 · F4</text>

  <!-- AuditSuite: B=2, F=5 → (304, 80) -->
  <circle cx="304" cy="100" r="9" class="dot" fill="#EC4899" />
  <text x="304" y="84" text-anchor="middle" class="dot-label">6. AuditSuite</text>
  <text x="304" y="122" text-anchor="middle" class="subtitle">B2 · F5</text>

  <!-- 범례 -->
  <text x="80" y="555" class="subtitle">★ = 최종 선정 (RTA — 확장형: IDV+·RegGuard·AutoDoc을 내부 에이전트로 흡수)</text>
</svg>
